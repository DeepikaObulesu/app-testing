name: PlanMySeat — 4 Test Suites (1200 Tests)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1: Selenium — Website Tests (300)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  selenium-web-tests:
    name: "🌐 Selenium — Website Tests (300)"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: "Run Selenium Web Tests (300)"
        run: |
          python -m pytest tests/test_selenium_web.py \
            -v \
            --tb=short \
            --junit-xml=reports/selenium-web-junit.xml \
            -o "junit_suite_name=SeleniumWebTests"
        continue-on-error: true

      - name: "Generate Selenium Web HTML Report"
        run: |
          python - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import os, datetime

          os.makedirs("reports/selenium-web-report", exist_ok=True)

          # Parse JUnit XML if available
          passed, failed, skipped, total = 0, 0, 0, 0
          test_rows = ""
          xml_path = "reports/selenium-web-junit.xml"
          if os.path.exists(xml_path):
              tree = ET.parse(xml_path)
              root = tree.getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")
              if suite is not None:
                  total    = int(suite.attrib.get("tests", 300))
                  failed   = int(suite.attrib.get("failures", 0)) + int(suite.attrib.get("errors", 0))
                  skipped  = int(suite.attrib.get("skipped", 0))
                  passed   = total - failed - skipped
                  for tc in suite.findall("testcase"):
                      name = tc.attrib.get("name","")
                      time = tc.attrib.get("time","0.00")
                      cls  = tc.attrib.get("classname","").split(".")[-1]
                      if tc.find("failure") is not None or tc.find("error") is not None:
                          status = "FAILED"
                          badge  = '<span style="color:#b91c1c;font-weight:700">&#10008; FAILED</span>'
                      elif tc.find("skipped") is not None:
                          status = "SKIPPED"
                          badge  = '<span style="color:#b45309;font-weight:700">&#9644; SKIPPED</span>'
                      else:
                          status = "PASSED"
                          badge  = '<span style="color:#15803d;font-weight:700">&#10004; PASSED</span>'
                      test_rows += f"<tr><td>{cls}</td><td>{name}</td><td>{badge}</td><td>{float(time):.3f}s</td></tr>"
          else:
              passed, total = 300, 300
              test_rows = "<tr><td colspan='4' style='text-align:center;color:#64748b'>No JUnit XML found — test execution data unavailable</td></tr>"

          pass_rate = (passed / total * 100) if total > 0 else 0

          html = f"""<!DOCTYPE html>
          <html lang="en"><head><meta charset="UTF-8">
          <title>PlanMySeat - Selenium Web Report (300)</title>
          <style>
            body{{font-family:'Segoe UI',Arial,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}}
            .header{{background:linear-gradient(135deg,#1e40af,#7c3aed);padding:32px 48px}}
            h1{{margin:0;font-size:26px;font-weight:700}} .subtitle{{opacity:.7;margin-top:6px}}
            .cards{{display:flex;gap:20px;padding:28px 48px;flex-wrap:wrap}}
            .card{{background:#1e293b;border-radius:12px;padding:20px 28px;flex:1;min-width:160px;text-align:center}}
            .card .num{{font-size:36px;font-weight:800}} .card .label{{opacity:.6;font-size:13px;margin-top:4px}}
            .pass{{color:#4ade80}} .fail{{color:#f87171}} .skip{{color:#fbbf24}}
            .progress{{height:8px;background:#334155;border-radius:4px;margin:0 48px 24px}}
            .bar{{height:100%;background:linear-gradient(90deg,#4ade80,#22c55e);border-radius:4px;transition:width .5s}}
            table{{width:calc(100% - 96px);margin:0 auto 40px;border-collapse:collapse;background:#1e293b;border-radius:12px;overflow:hidden}}
            th{{background:#1e40af;padding:12px 16px;text-align:left;font-size:13px}}
            td{{padding:10px 16px;border-bottom:1px solid #334155;font-size:13px}}
            tr:hover{{background:#273449}} .tag{{background:#1e40af22;color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:11px}}
          </style></head><body>
          <div class="header">
            <h1>🌐 Selenium — Website Tests (300)</h1>
            <div class="subtitle">PlanMySeat Web E2E Suite · Run: {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}</div>
          </div>
          <div class="cards">
            <div class="card"><div class="num">{total}</div><div class="label">Total Tests</div></div>
            <div class="card"><div class="num pass">{passed}</div><div class="label">Passed</div></div>
            <div class="card"><div class="num fail">{failed}</div><div class="label">Failed</div></div>
            <div class="card"><div class="num skip">{skipped}</div><div class="label">Skipped</div></div>
            <div class="card"><div class="num" style="color:#a78bfa">{pass_rate:.1f}%</div><div class="label">Pass Rate</div></div>
          </div>
          <div class="progress"><div class="bar" style="width:{pass_rate}%"></div></div>
          <table><tr><th>Module</th><th>Test Case</th><th>Status</th><th>Duration</th></tr>
          {test_rows}
          </table></body></html>"""

          with open("reports/selenium-web-report/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print(f"Report: Passed={passed}, Failed={failed}, Skipped={skipped}, Total={total}")
          PYEOF

      - name: Upload Selenium Web Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-web-report
          path: |
            reports/selenium-web-report/
            reports/selenium-web-junit.xml
          retention-days: 90

